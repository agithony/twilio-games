# Azure Container App spec for Voice Racer. Rendered by deploy.yml via envsubst (${APP_NAME},
# ${CONTAINER_IMAGE}, ${REVISION_SUFFIX}, ${BASE_URL}, ${ACR_SERVER}, ${ACR_USERNAME},
# ${ACR_PASSWORD}). One uniquely named revision carries image + registry + env + mount.
#
# SINGLE REPLICA IS REQUIRED, not a tuning choice: room/lobby/race state is in-memory in ONE
# process and the game/voice WebSockets are long-lived to it. Two replicas would let a player and
# the shared display land on different instances and never see the same race. minReplicas:1 also
# avoids scale-to-zero cold starts dropping the display's socket.
#
# NOTE: no top-level `tags:` here — `az containerapp create --yaml` rejects a tags sibling of
# properties ("JSON value could not be converted to System.Boolean, Path: $"). The required
# created_by tag (tenant policy) is passed via the `--tags` CLI flag on create, then preserved on
# subsequent `update --yaml` runs (update keeps existing tags). Matches the cartoon-printer pattern.
properties:
  configuration:
    ingress:
      external: true
      targetPort: 8080
      transport: auto            # supports the WebSocket upgrade for /game and /voice
    # `update --yaml` REPLACES the whole secrets+registries config, so we must redeclare the ACR
    # registry + its password secret here (else the auto-created registry secret is dropped and the
    # registry's PasswordSecretRef dangles → "PasswordSecretRef not found").
    secrets:
      - name: twilio-token
      - name: twilio-pt-token
      - name: twilio-account-sid
      - name: twilio-api-key
      - name: twilio-api-secret
      - name: arcade-signing-secret
      - name: arcade-display-token
      - name: voice-relay-token
      - name: editor-token
      - name: google-oauth-client-id
      - name: google-oauth-client-secret
      - name: openai-api-key
      - name: acr-password
        value: ${ACR_PASSWORD}
    registries:
      - server: ${ACR_SERVER}
        username: ${ACR_USERNAME}
        passwordSecretRef: acr-password
  template:
    revisionSuffix: ${REVISION_SUFFIX}
    containers:
      - name: ${APP_NAME}
        image: ${CONTAINER_IMAGE}
        # 2 CPU / 4Gi (not 1/2): at 1 CPU the container was CPU-STARVED — even /healthz (a no-op)
        # swung 2–12s on an idle container and large GLBs crawled (~50KB/s; the 7.8MB monster-truck
        # model timed out), so the deployed menu/3D-background was very delayed. The single Node
        # process runs the game/voice WS, the fixed-timestep sim loop, static serving (gzip + stream),
        # AND transpiles via tsx — it needs the headroom. Bumping to 2 CPU made /healthz steady ~0.4s
        # and cut the JS bundle from ~8.6s to 0.57s. (Valid Consumption pairs: 2.0 CPU ↔ 4Gi.)
        resources:
          cpu: 2.0
          memory: 4Gi
        probes:
          - type: Startup
            httpGet:
              path: /livez
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5
          - type: Readiness
            httpGet:
              path: /livez
              port: 8080
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          - type: Liveness
            httpGet:
              path: /livez
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
        env:
          - name: PORT
            value: "8080"
          - name: NODE_ENV
            value: production
          # Public base URL for Twilio webhooks (the app derives the wss:// game/voice URLs from it).
          - name: PUBLIC_BASE_URL
            value: ${BASE_URL}
          # Legacy voice-number fallback. Locale-specific numbers are durable Arcade runtime settings.
          - name: GAME_PHONE_NUMBER
            value: "${GAME_PHONE_NUMBER}"
          # Locale used when no shared display is connected. The display's picker overrides this for
          # incoming calls while it is online.
          - name: DEFAULT_LOCALE
            value: "${DEFAULT_LOCALE}"
          # Persistent data dir (Azure Files mount) — start.sh symlinks /app/data here.
          - name: DATA_MOUNT
            value: /app/appdata
          # Twilio webhook signature validation is ON whenever this is set (fail-closed in index.ts).
          - name: TWILIO_AUTH_TOKEN
            secretRef: twilio-token
          # Portuguese Voice number is owned by a second Twilio account. Its Auth Token validates
          # that account's incoming Voice and session-ended webhook signatures.
          - name: TWILIO_PT_AUTH_TOKEN
            secretRef: twilio-pt-token
          - name: VOICE_RELAY_TOKEN
            secretRef: voice-relay-token
          # TAC, Conversation Orchestrator, and Conversation Memory credentials.
          - name: TWILIO_ACCOUNT_SID
            secretRef: twilio-account-sid
          - name: TWILIO_API_KEY
            secretRef: twilio-api-key
          - name: TWILIO_API_SECRET
            secretRef: twilio-api-secret
          # SMS is intentionally separate from the locale-specific voice numbers.
          - name: TWILIO_PHONE_NUMBER
            value: "${TWILIO_SMS_NUMBER}"
          - name: TWILIO_SMS_NUMBER
            value: "${TWILIO_SMS_NUMBER}"
          - name: TWILIO_WHATSAPP_NUMBER
            value: "${TWILIO_WHATSAPP_NUMBER}"
          - name: TWILIO_MESSAGING_SERVICE_SID
            value: "${TWILIO_MESSAGING_SERVICE_SID}"
          - name: ARCADE_OUTBOUND_MESSAGING_ENABLED
            value: "${ARCADE_OUTBOUND_MESSAGING_ENABLED}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_ADMITTED_EN_US
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_ADMITTED_EN_US}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_ADMITTED_PT_BR
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_ADMITTED_PT_BR}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_OVERFLOW_EN_US
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_OVERFLOW_EN_US}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_OVERFLOW_PT_BR
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_OVERFLOW_PT_BR}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_CALL_NOW_EN_US
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_CALL_NOW_EN_US}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_CALL_NOW_PT_BR
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_CALL_NOW_PT_BR}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_RESULTS_EN_US
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_RESULTS_EN_US}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_RESULTS_PT_BR
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_RESULTS_PT_BR}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_NEXT_GAME_EN_US
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_NEXT_GAME_EN_US}"
          - name: TWILIO_WHATSAPP_CONTENT_SID_STATION_NEXT_GAME_PT_BR
            value: "${TWILIO_WHATSAPP_CONTENT_SID_STATION_NEXT_GAME_PT_BR}"
          - name: TWILIO_CONVERSATION_CONFIGURATION_ID
            value: "${TWILIO_CONVERSATION_CONFIGURATION_ID}"
          # Gate the editor's /api writes on a public deploy. Empty = writes open (not recommended public).
          - name: EDITOR_TOKEN
            secretRef: editor-token
          # Private activation dashboard: verified @twilio.com Google accounts plus one exception.
          - name: GOOGLE_OAUTH_CLIENT_ID
            secretRef: google-oauth-client-id
          - name: GOOGLE_OAUTH_CLIENT_SECRET
            secretRef: google-oauth-client-secret
          - name: ANALYTICS_ALLOWED_EMAIL
            value: "${ANALYTICS_ALLOWED_EMAIL}"
          - name: ARCADE_ADMIN_EMAILS
            value: "${ARCADE_ADMIN_EMAILS}"
          # One root key derives separate player-session and challenge-token keys. Mode-off ignores it.
          - name: ARCADE_SIGNING_SECRET
            secretRef: arcade-signing-secret
          - name: ARCADE_DISPLAY_TOKEN
            secretRef: arcade-display-token
          - name: ARCADE_STATE_PATH
            value: /app/data/arcade-state.json
          # Mode-off production calls receive paused TwiML instead of standalone Conversation Relay.
          - name: ARCADE_STANDALONE_VOICE_ENABLED
            value: "false"
          # Direct signed webhooks own SMS/WhatsApp game commands; TAC enriches Conversation Memory.
          - name: ARCADE_TAC_ENABLED
            value: "true"
          # ElevenLabs voiceId for Conversation Relay talk-back (greeting/countdown/result to callers).
          # Empty → Relay's default voice (talk-back still speaks). Set to a high-energy sports-
          # announcer voiceId from the ElevenLabs library for the racing vibe. Rendered via envsubst
          # from the CR_TTS_VOICE repo variable (falls back to empty if unset).
          - name: CR_TTS_VOICE
            value: "${CR_TTS_VOICE}"
          # Optional Portuguese-specific ElevenLabs voice. Empty uses Relay's pt-BR default.
          - name: CR_TTS_VOICE_PT_BR
            value: "${CR_TTS_VOICE_PT_BR}"
          # Conversational AI host. The deploy stores an optional missing key as `disabled`, which
          # the server treats as unset and falls back to deterministic scripted behavior.
          - name: OPENAI_API_KEY
            secretRef: openai-api-key
          - name: OPENAI_MODEL
            value: "${OPENAI_MODEL}"
        volumeMounts:
          - volumeName: appdata
            mountPath: /app/appdata
    scale:
      minReplicas: 1
      maxReplicas: 1
    volumes:
      - name: appdata
        storageName: appdata
        storageType: AzureFile
