name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # so deploy.yml can gate on this exact job

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # The deploy serves this exact bundle from the Node server, so a broken build must fail CI
      # BEFORE we ship — not surface as a blank page in production.
      - name: Build client
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high || true
