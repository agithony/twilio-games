<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Racer</title>
  <link rel="icon" href="/brand/Twilio_Logo_Bug_White.svg" />
  <link rel="stylesheet" href="./racer.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Opaque branded boot veil: covers the 3D scene assembling (map load + camera settle + first
       attract frame) so the user never sees the ugly connecting→world→top-down→cars cut sequence.
       Fades out once the attract scene has painted a stable frame. -->
  <div id="veil">
    <img src="/brand/Twilio_Logo_Bug_White.svg" alt="" />
    <div class="veil-eyebrow">Twilio</div>
    <div class="veil-title">Voice Racer</div>
    <div class="veil-bar"><span></span></div>
  </div>

  <!-- In-game HUD (hidden while a menu screen is up via body.in-menu) -->
  <div id="hud" class="hud-pill">
    <img class="brandbug" src="/brand/Twilio_Logo_Bug_White.svg" alt="" />
    <span class="htitle">Voice Racer</span>
  </div>
  <div id="hint" class="hud-pill">
    <span class="me">You</span>
    <span class="kbd">←</span><span class="kbd">→</span> lanes ·
    <span class="kbd">↑</span> boost · <span class="kbd">↓</span> brake · <span class="kbd">Space</span> power
  </div>

  <div id="big"></div>

  <!-- Legacy lobby overlay retired; the Screens overlay (built in main.ts) handles all menu states. -->
  <div id="lobby" style="display:none"></div>

  <div id="ticker"></div>
  <button id="mute">Host audio: off</button>

  <script type="module" src="./main.ts"></script>
</body>
</html>
