<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Monsters</title>
  <link rel="icon" href="/brand/Twilio_Logo_Bug_White.svg" />
  <link rel="stylesheet" href="./monsters.css" />
  <style>
    .music-toggle {
      position: absolute; right: 16px; bottom: 16px; z-index: 20;
      width:38px;height:38px;background: rgba(12, 18, 40, 0.72); border: 1px solid rgba(255, 255, 255, 0.10); border-radius: 10px;
      padding:0;color: rgba(174, 182, 204, 1);cursor: pointer; transition: all .2s ease;
      display: flex; align-items: center; justify-content:center;text-decoration: none; outline: none;
      backdrop-filter: blur(10px);
    }
    .music-toggle:hover { color: #FFFFFF; border-color: rgba(255, 255, 255, 0.16); }
    .music-toggle:active { transform: scale(0.96); }
    .music-toggle:focus { outline: none; }
    .music-toggle:focus-visible { outline:3px solid #2188EF;outline-offset:3px; }
    .music-toggle-icon { display: flex; align-items: center; justify-content: center; line-height: 0; }
    .music-toggle-icon svg { width: 18px; height: 18px; stroke: currentColor; text-decoration: none; }
    #vm-hud {
      position: fixed; top: 16px; left: 112px; z-index: 20;
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: rgba(12, 18, 40, 0.72); border: 1px solid rgba(255, 255, 255, 0.10); border-radius: 14px;
      backdrop-filter: blur(10px);
    }
    #vm-hud .brandbug { width: 22px; height: 22px; }
    #vm-hud .htitle { font-family: 'Twilio Sans Display', ui-sans-serif, system-ui, sans-serif;
      font-weight: 800; color: #FFFFFF; letter-spacing: .02em; font-size: 15px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- The Game Boy battle canvas lives here (BattleRenderer appends its <canvas>). -->
    <div id="stage"></div>
    <!-- Lobby / monster-select / results overlay (hidden during a live battle). -->
    <div id="overlay" role="region"></div>
  </div>

  <a id="game-home" class="game-home" href="/" aria-label="Return to Twilio Games home">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 11.5 12 4l9 7.5M5.5 10v10h13V10M9.5 20v-6h5v6" />
    </svg>
    <span id="game-home-label">Home</span>
  </a>

  <div id="vm-hud">
    <img class="brandbug" src="/brand/Twilio_Logo_Bug_White.svg" alt="" />
    <span class="htitle">Voice Monsters</span>
  </div>

  <!-- Music toggle button container -->
  <div id="music-toggle-container"></div>
  <script type="module" src="./battle/monsters.ts"></script>
</body>
</html>
